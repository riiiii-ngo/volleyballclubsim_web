<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>バレーボールクラブ経営シム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- タイトル画面 -->
    <div id="screen-title" class="screen active">
      <div class="title-wrap">
        <div class="title-logo">🏐</div>
        <h1 class="title-text">バレーボール<br>クラブ経営シム</h1>
        <button id="btn-start" class="btn btn-primary btn-lg">ゲームスタート</button>
        <button id="btn-continue" class="btn btn-secondary btn-lg" style="display:none">続きから</button>
      </div>
    </div>

    <!-- 新規ゲーム設定画面 -->
    <div id="screen-newgame" class="screen">
      <div class="newgame-wrap">
        <h2>チーム設定</h2>
        <div class="form-group">
          <label>チーム名</label>
          <input type="text" id="input-teamname" class="form-input" maxlength="12" placeholder="青山バレー部" value="青山バレー部">
        </div>
        <button id="btn-newgame-confirm" class="btn btn-primary btn-lg">ゲームを始める</button>
      </div>
    </div>

    <!-- メインゲーム画面 -->
    <div id="screen-game" class="screen">
      <!-- ヘッダー -->
      <header id="game-header">
        <div class="header-row1">
          <span id="hdr-season"></span>
          <span id="hdr-teamname"></span>
          <span id="hdr-money"></span>
        </div>
        <div class="header-row2">
          <span id="hdr-rank"></span>
          <span id="hdr-stats"></span>
          <span id="hdr-height"></span>
        </div>
        <div class="header-row3">
          <span id="hdr-nextmatch"></span>
          <span id="hdr-salary"></span>
        </div>
      </header>

      <!-- メインコンテンツ -->
      <main id="screen-container"></main>

      <!-- フッタータブ -->
      <nav id="footer-tabs">
        <button class="tab-btn active" data-tab="practice">練習・試合</button>
        <button class="tab-btn" data-tab="team">チーム管理</button>
        <button class="tab-btn" data-tab="shop">ショップ</button>
        <button class="tab-btn" data-tab="league">リーグ</button>
        <button class="tab-btn" data-tab="other">その他</button>
      </nav>
    </div>
  </div>

  <!-- モーダル -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box">
      <div id="modal-content"></div>
      <div id="modal-actions" class="modal-actions"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
